name: Build Reteras Model Studio EXE

on:
  push:
    branches: [ CN ]  # 可以在这里指定触发工作流的分支

jobs:
  build:
    runs-on: windows-latest
    strategy:
      matrix:
        java: [ '17' ]  # 项目需要 JDK 17

    steps:
    - uses: actions/checkout@v4

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        java-version: ${{ matrix.java }}
        distribution: 'temurin'
        cache: 'gradle'

    - name: Grant execute permission for gradlew
      run: chmod +x ./gradlew
      working-directory: ./

    - name: List all available Gradle tasks
      run: ./gradlew.bat tasks --all
      working-directory: ./

    - name: Build with Gradle
      run: ./gradlew.bat
      working-directory: ./

    - name: Create EXE with jpackage (Flat Structure)
      run: |
        ./gradlew.bat jpackage -PoutputDir=build/dist -PimageName=ReterasModelStudio \
          --dest=build/dist/ReterasModelStudio \
          --type=EXE \
          --name=ReterasModelStudio \
          --main-class=your.main.Class \  # 替换为实际主类
          --main-jar=your-jar-file.jar   # 替换为实际JAR文件名
      continue-on-error: false  # 移除错误跳过

    - name: Validate Output Structure
      run: |
        Get-ChildItem -Path build/dist/ReterasModelStudio -Recurse | 
        Where-Object { $_.Extension -eq ".exe" } | 
        Select-Object FullName

    - name: Upload EXE Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ReterasModelStudio-EXE
        path: D:/a/ReterasModelStudio/ReterasModelStudio

