name: Build Reteras Model Studio

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:  # 允许手动触发

jobs:
  build:
    runs-on: windows-latest
    strategy:
      matrix:
        java: [ '17' ]  # 项目需要 JDK 17
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up JDK ${{ matrix.java }}
      uses: actions/setup-java@v4
      with:
        java-version: ${{ matrix.java }}
        distribution: 'temurin'
        cache: 'gradle'

    # 安装必要工具
    - name: Setup tools
      shell: powershell
      run: |
        Write-Host "Installing Inno Setup..."
        choco install innosetup -y --no-progress
        
        # 查找 ISCC.exe 位置
        $isccPaths = @(
          "C:\Program Files (x86)\Inno Setup 6\ISCC.exe",
          "C:\Program Files\Inno Setup 6\ISCC.exe",
          "C:\Program Files (x86)\Inno Setup 5\ISCC.exe",
          "C:\Program Files\Inno Setup 5\ISCC.exe"
        )
        
        $foundPath = $null
        foreach ($path in $isccPaths) {
          if (Test-Path $path) {
            $foundPath = $path
            break
          }
        }
        
        if (-not $foundPath) {
          # 尝试通过 PATH 查找
          $foundPath = (Get-Command ISCC.exe -ErrorAction SilentlyContinue)?.Path
        }
        
        if ($foundPath) {
          Write-Host "ISCC found at $foundPath"
          echo "ISCC_PATH=$foundPath" >> $env:GITHUB_ENV
        } else {
          Write-Error "ISCC.exe not found! Please install Inno Setup."
          exit 1
        }

    # ✅ 修复: 统一使用 PowerShell 语法处理 gradlew
    - name: Prepare gradlew
      shell: powershell
      run: |
        if (Test-Path "gradlew") {
          Write-Host "Preparing gradlew script..."
          # 移除只读属性
          Set-ItemProperty -Path "gradlew" -Name IsReadOnly -Value $false -Force
          
          # 确保文件有执行权限 (Windows 不需要 chmod，但确保格式正确)
          $content = Get-Content "gradlew" -Raw
          if ($content -match "`r`n") {
            Write-Host "gradlew already has Windows line endings"
          } else {
            Write-Host "Converting gradlew to Windows line endings..."
            $content = $content -replace "`n", "`r`n"
            Set-Content -Path "gradlew" -Value $content -NoNewline
          }
        } else {
          Write-Error "gradlew script not found in repository!"
          exit 1
        }

    # ✅ 修复: 使用 PowerShell 调用 Gradle
    - name: Build with Gradle
      shell: powershell
      run: |
        Write-Host "Building project with Gradle..."
        $gradleArgs = @(
          "build",
          "--no-daemon",
          "--info",
          "--stacktrace"
        )
        
        if ($env:CI) {
          $gradleArgs += "--continuous-build"
        }
        
        $process = Start-Process -FilePath ".\gradlew" `
          -ArgumentList $gradleArgs `
          -NoNewWindow `
          -PassThru `
          -Wait
        
        if ($process.ExitCode -ne 0) {
          Write-Error "Gradle build failed with exit code $($process.ExitCode)"
          exit $process.ExitCode
        }
        
        Write-Host "Gradle build completed successfully"

    # ✅ 修复: 使用 PowerShell 创建 JAR
    - name: Create executable JAR
      shell: powershell
      run: |
        Write-Host "Creating executable JAR..."
        $jarProcess = Start-Process -FilePath ".\gradlew" `
          -ArgumentList "jar", "--no-daemon" `
          -NoNewWindow `
          -PassThru `
          -Wait
        
        if ($jarProcess.ExitCode -ne 0) {
          Write-Error "JAR creation failed with exit code $($jarProcess.ExitCode)"
          exit $jarProcess.ExitCode
        }
        
        # 验证 JAR 文件
        $jarPath = "build\libs\matrixeater.jar"
        if (Test-Path $jarPath) {
          $size = (Get-Item $jarPath).Length
          Write-Host "JAR created successfully: $jarPath ($size bytes)"
        } else {
          Write-Error "JAR file not found at $jarPath"
          Get-ChildItem "build\libs" -Recurse -ErrorAction SilentlyContinue
          exit 1
        }

    # ✅ 修复: 使用 PowerShell 语法的 jpackage
    - name: Package Windows application
      shell: powershell
      run: |
        Write-Host "Creating Windows application with jpackage..."
        $outputDir = "build\installer"
        $null = New-Item -Path $outputDir -ItemType Directory -Force
        
        # 设置 jpackage 参数
        $jpackageArgs = @(
          "--name", "ReterasModelStudio",
          "--input", "build\libs",
          "--main-jar", "matrixeater.jar",
          "--main-class", "com.matrixeater.src.MainFrame",
          "--type", "exe",
          "--app-version", "1.0.0",
          "--vendor", "Retera",
          "--description", "Warcraft III Model Editor",
          "--win-menu",
          "--win-shortcut",
          "--output", $outputDir
        )
        
        # 检查图标文件
        $iconPath = "resources\icons\app.ico"
        if (Test-Path $iconPath) {
          $jpackageArgs += "--icon", $iconPath
          Write-Host "Using application icon: $iconPath"
        } else {
          Write-Warning "Icon file not found at $iconPath. Using default icon."
        }
        
        Write-Host "Running jpackage with arguments:"
        Write-Host ($jpackageArgs -join " ")
        
        $env:_JAVA_OPTIONS = "-Djava.io.tmpdir=$env:RUNNER_TEMP"
        
        $jpackageProcess = Start-Process -FilePath "jpackage" `
          -ArgumentList $jpackageArgs `
          -NoNewWindow `
          -PassThru `
          -Wait `
          -WorkingDirectory $PWD
        
        if ($jpackageProcess.ExitCode -ne 0) {
          Write-Error "jpackage failed with exit code $($jpackageProcess.ExitCode)"
          
          # 调试信息
          Write-Host "Checking build/libs directory:"
          Get-ChildItem "build\libs" -Recurse -ErrorAction SilentlyContinue
          
          Write-Host "Java version:"
          java -version 2>&1 | ForEach-Object { Write-Host $_ }
          
          Write-Host "jpackage version:"
          jpackage --version 2>&1 | ForEach-Object { Write-Host $_ }
          
          exit $jpackageProcess.ExitCode
        }
        
        # 验证输出
        $exePath = "$outputDir\ReterasModelStudio\ReterasModelStudio.exe"
        if (Test-Path $exePath) {
          $size = (Get-Item $exePath).Length
          Write-Host "Application created successfully: $exePath ($size bytes)"
        } else {
          Write-Error "Executable not found at $exePath"
          Get-ChildItem $outputDir -Recurse -ErrorAction SilentlyContinue
          exit 1
        }

    # ✅ 修复: 完全 PowerShell 语法的 Inno Setup
    - name: Create Inno Setup installer
      shell: powershell
      run: |
        Write-Host "Creating Inno Setup installer..."
        $setupScript = "build\setup.iss"
        $outputDir = "build\final-installer"
        $null = New-Item -Path $outputDir -ItemType Directory -Force
        
        # 生成 Inno Setup 脚本
        $issContent = @"
        [Setup]
        AppName=Reteras Model Studio
        AppVersion=1.0.0
        DefaultDirName={autopf}\Reteras Model Studio
        DefaultGroupName=Reteras Model Studio
        OutputDir=$outputDir
        OutputBaseFilename=ReterasModelStudio-Setup
        Compression=lzma2
        SolidCompression=yes
        PrivilegesRequired=lowest
        WizardStyle=modern
        SetupIconFile=resources\icons\app.ico
        UninstallDisplayIcon={app}\ReterasModelStudio.exe

        [Files]
        Source: "build\installer\ReterasModelStudio\*"; DestDir: "{app}"; Flags: ignoreversion recursesubdirs createallsubdirs
        Source: "resources\*"; DestDir: "{app}\resources"; Flags: ignoreversion recursesubdirs createallsubdirs
        Source: "craft3data\*"; DestDir: "{app}\craft3data"; Flags: ignoreversion recursesubdirs createallsubdirs
        Source: "jars\*"; DestDir: "{app}\jars"; Flags: ignoreversion recursesubdirs createallsubdirs

        [Icons]
        Name: "{group}\Reteras Model Studio"; Filename: "{app}\ReterasModelStudio.exe"; IconFilename: "{app}\ReterasModelStudio.exe"
        Name: "{group}\Uninstall Reteras Model Studio"; Filename: "{uninstallexe}"
        Name: "{commondesktop}\Reteras Model Studio"; Filename: "{app}\ReterasModelStudio.exe"; Tasks: desktopicon

        [Tasks]
        Name: "desktopicon"; Description: "Create a desktop icon"; GroupDescription: "Additional icons:"; Flags: unchecked

        [Run]
        Filename: "{app}\ReterasModelStudio.exe"; Description: "Launch Reteras Model Studio"; Flags: nowait postinstall skipifsilent
        "@
        
        $issContent | Set-Content -Path $setupScript -Encoding UTF8
        Write-Host "Inno Setup script created at $setupScript"
        
        # 调试: 显示脚本内容
        Write-Host "Inno Setup script content:"
        Get-Content $setupScript
        
        # 编译安装程序
        if (-not $env:ISCC_PATH) {
          Write-Error "ISCC_PATH environment variable not set!"
          exit 1
        }
        
        Write-Host "Compiling installer with ISCC from $($env:ISCC_PATH)..."
        $isccProcess = Start-Process -FilePath $env:ISCC_PATH `
          -ArgumentList "`"$setupScript`"" `
          -NoNewWindow `
          -PassThru `
          -Wait
        
        if ($isccProcess.ExitCode -ne 0) {
          Write-Error "ISCC failed with exit code $($isccProcess.ExitCode)"
          
          # 调试信息
          Write-Host "ISCC path: $($env:ISCC_PATH)"
          Write-Host "Current directory: $(Get-Location)"
          Write-Host "Files in current directory:"
          Get-ChildItem -Force
          
          exit $isccProcess.ExitCode
        }
        
        # 验证输出
        $installerPath = "$outputDir\ReterasModelStudio-Setup.exe"
        if (Test-Path $installerPath) {
          $size = (Get-Item $installerPath).Length
          Write-Host "Installer created successfully: $installerPath"
          Write-Host "Size: $size bytes"
          
          # 检查最小大小 (20MB 合理下限)
          if ($size -lt 20MB) {
            Write-Warning "Installer size is smaller than expected ($size bytes). This might indicate missing files."
            Write-Host "Installer directory contents:"
            Get-ChildItem $outputDir
          }
        } else {
          Write-Error "Installer was not created at $installerPath!"
          Write-Host "Output directory contents:"
          Get-ChildItem $outputDir -ErrorAction SilentlyContinue
          Write-Host "Parent directory contents:"
          Get-ChildItem "build" -ErrorAction SilentlyContinue
          exit 1
        }

    # 上传构建产物
    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ReterasModelStudio-Windows
        path: |
          build/final-installer/ReterasModelStudio-Setup.exe
          build/libs/matrixeater.jar
        retention-days: 30

    # 验证安装程序
    - name: Verify installer
      shell: powershell
      run: |
        $installerPath = "build\final-installer\ReterasModelStudio-Setup.exe"
        
        if (-not (Test-Path $installerPath)) {
          Write-Error "Installer not found at $installerPath"
          exit 1
        }
        
        $size = (Get-Item $installerPath).Length
        Write-Host "Final installer size: $size bytes"
        
        # 创建安装测试目录
        $testDir = "installer-test"
        $null = New-Item -Path $testDir -ItemType Directory -Force
        
        # 运行安装程序（静默模式）
        Write-Host "Testing installer in silent mode..."
        $installerArgs = @("/VERYSILENT", "/DIR=`"$testDir\installed`"", "/LOG=`"$testDir\install.log`"")
        
        $installProcess = Start-Process -FilePath $installerPath `
          -ArgumentList $installerArgs `
          -NoNewWindow `
          -PassThru `
          -Wait
        
        if ($installProcess.ExitCode -ne 0) {
          Write-Error "Installer test failed with exit code $($installProcess.ExitCode)"
          if (Test-Path "$testDir\install.log") {
            Write-Host "Installation log:"
            Get-Content "$testDir\install.log" -Tail 20
          }
          exit $installProcess.ExitCode
        }
        
        Write-Host "Installer test passed successfully"
        Write-Host "Installed files:"
        Get-ChildItem "$testDir\installed" -Recurse -Depth 2
