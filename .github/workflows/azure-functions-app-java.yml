name: Build Reteras Model Studio EXE

on:
  push:
    branches: [ CN ]  # 可以在这里指定触发工作流的分支

jobs:
  build:
    runs-on: windows-latest
    strategy:
      matrix:
        java: [ '17' ]  # 项目需要 JDK 17

    steps:
    - uses: actions/checkout@v4

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        java-version: ${{ matrix.java }}
        distribution: 'temurin'
        cache: 'gradle'

    - name: Gradle 编译生成可执行JAR
      run: |
        ./gradlew.bat :matrixeater:dist

    - name: 查找可执行JAR
      run: |
        $jar = Get-ChildItem -Path "matrixeater\build\libs" -Filter "*.jar" | Where-Object { $_.Name -notmatch "plain|javadoc|sources" } | Select-Object -First 1
        if ($null -eq $jar) {
          Write-Error "未找到可执行JAR文件"
          exit 1
        }
        echo "JARFILE=$($jar.Name)" | Out-File -FilePath $env:GITHUB_ENV -Append
        echo "JARPATH=$($jar.DirectoryName)" | Out-File -FilePath $env:GITHUB_ENV -Append
        Write-Host "找到JAR: $($jar.FullName)"

    - name: 生成精简JRE
      run: |
        jlink --add-modules ALL-MODULE-PATH --output jre

    - name: ✅ 打包
      run: |
        # 使用 jpackage 生成便携镜像 (app-image 类型)
        # 注意: --type app-image 时不能指定 --app-image 参数,输出由 --dest 控制
        jpackage `
          --type app-image `
          --input "${{ env.JARPATH }}" `
          --main-jar "${{ env.JARFILE }}" `
          --main-class "com.matrixeater.src.MainFrame" `
          --dest "." `
          --name "ReterasModelStudio" `
          --app-image "jre"

    - name: 🔧 扁平化处理
      run: |
        # 根据用户偏好:必须输出扁平化结构 (无 app/runtime 子文件夹)
        $appName = "ReterasModelStudio"
        $outputDir = "./${appName}"
        
        Write-Host "开始扁平化处理..."
        Write-Host "输出目录: $outputDir"
        
        # 检查目录结构
        if (Test-Path "$outputDir/app") {
            Write-Host "检测到 app/runtime 分离结构,开始合并..."
            
            # 将 app 目录内容移动到根目录
            Get-ChildItem "$outputDir/app" -Force | ForEach-Object {
                Move-Item $_.FullName $outputDir -Force
                Write-Host "  移动: $($_.Name)"
            }
            
            # 删除空的 app 目录
            Remove-Item "$outputDir/app" -Recurse -Force
            Write-Host "已删除 app 目录"
        } else {
            Write-Host "目录已是扁平化结构,无需处理"
        }
        
        # 列出最终结构
        Write-Host "`n最终目录结构:"
        Get-ChildItem $outputDir | Select-Object Name, Length | Format-Table

    - name: Upload EXE Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ReterasModelStudio-Portable
        path: ./ReterasModelStudio
