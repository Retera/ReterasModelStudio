name: Build Reteras Model Studio EXE

on:
  push:
    branches: [ CN ]  # 可以在这里指定触发工作流的分支

jobs:
  build:
    runs-on: windows-latest
    strategy:
      matrix:
        java: [ '17' ]  # 项目需要 JDK 17

    steps:
    - uses: actions/checkout@v4

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        java-version: ${{ matrix.java }}
        distribution: 'temurin'
        cache: 'gradle'

    - name: Grant execute permission for gradlew
      run: chmod +x ./gradlew
      working-directory: ./

    - name: List all available Gradle tasks
      run: ./gradlew.bat tasks --all
      working-directory: ./

    - name: Build with Gradle
      run: ./gradlew.bat
      working-directory: ./

    - name: 使用jpackage生成EXE文件
      run: |
        $version = "0.4.5"
        $commitHash = $env:GITHUB_SHA.substring(0,7)
        $exeName = "ReterasModelStudio_$commitHash"

        jpackage `
          --type exe `
          --name "ReterasModelStudio" `
          --input "matrixeater/build/libs" `
          --main-jar "drms-0.4.5.jar" `
          --main-class "com.matrixeater.src.MainFrame" `
          --dest "$exeName" `
          --java-options "-Xmx2G" `
          --win-menu `
          --win-shortcut `
          --win-dir-chooser `
          --app-version "$version"

        Write-Host "生成的EXE文件："
        Get-ChildItem "$exeName" -Recurse -Include *.exe | ForEach-Object { 
            Write-Host "  EXE文件: $($_.FullName)"
        }

    - name: Upload EXE Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ReterasModelStudio-EXE
        path: D:/a/ReterasModelStudio

