name: Build Reteras Model Studio EXE

on:
  push:
    branches: [ CN ]

jobs:
  build:
    runs-on: windows-latest
    strategy:
      matrix:
        java: [ '17' ]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        java-version: ${{ matrix.java }}
        distribution: 'temurin'
        cache: 'gradle'

    - name: Gradle 编译生成可执行JAR
      run: |
        ./gradlew.bat :matrixeater:dist
  
    - name: 生成 JRE 到打包目录（根目录结构）
      run: |
        jlink --add-modules ALL-MODULE-PATH --output ./ReterasModelStudio

    - name: ✅ 原生平铺打包（无 app / 无 runtime / 不移动文件）
      run: |
        jpackage `
          --type app-image `
          --input "${{ env.JARPATH }}" `
          --main-class "com.matrixeater.src.MainFrame" `
          --dest "." `
          --runtime-image "." `

    - name: 上传最终程序
      uses: actions/upload-artifact@v4
      with:
        name: ReterasModelStudio-Portable
        path: ./ReterasModelStudio