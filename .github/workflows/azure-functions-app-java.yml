name: Build Reteras Model Studio EXE

on:
  push:
    branches: [ CN ]  # 可以在这里指定触发工作流的分支

jobs:
  build:
    runs-on: windows-latest
    strategy:
      matrix:
        java: [ '17' ]  # 项目需要 JDK 17

    steps:
    - uses: actions/checkout@v4

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        java-version: ${{ matrix.java }}
        distribution: 'temurin'
        cache: 'gradle'

    - name: Gradle 编译生成 JAR
      run: |
        ./gradlew.bat assemble

    - name: 查找JAR
      run: |
        $jar = Get-ChildItem -Path "." -Recurse -Filter "*.jar" | Where-Object { $_.Name -notmatch "plain|javadoc|sources" } | Select-Object -First 1
        echo "JARFILE=$($jar.Name)" | Out-File -FilePath $env:GITHUB_ENV -Append
        echo "JARPATH=$($jar.DirectoryName)" | Out-File -FilePath $env:GITHUB_ENV -Append

    - name: 生成exe
      run: |
        jlink --add-modules ALL-MODULE-PATH --output jre

    - name: 打包EXE到根目录
      run: |
        jpackage --type app-image `
          --input "${{ env.JARPATH }}" `
          --main-jar "${{ env.JARFILE }}" `
          --dest "." `
          --name "final" `
          --runtime-image "jre"

    - name: Upload EXE Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ReterasModelStudio-EXE
        path: D:/a/ReterasModelStudio/ReterasModelStudio

