name: Build Java EXE (Manual Launch4j)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # 允许手动触发

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        shell: cmd
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'maven'

    - name: Install Eclipse IDE
      run: |
        echo Downloading Eclipse 2024-06...
        curl -L -o eclipse.zip "https://www.eclipse.org/downloads/download.php?file=/technology/epp/downloads/release/2024-06/R/eclipse-java-2024-06-R-win32-x86_64.zip&r=1"
        mkdir "%RUNNER_TEMP%\eclipse"
        tar -xzf eclipse.zip -C "%RUNNER_TEMP%\eclipse" --strip-components=1
        echo "ECLIPSE_HOME=%RUNNER_TEMP%\eclipse" >> %GITHUB_ENV%
        echo Eclipse installed at %RUNNER_TEMP%\eclipse

    - name: Prepare project files
      run: |
        cd "%GITHUB_WORKSPACE%"
        if not exist .project (
          echo ^<?xml version="1.0" encoding="UTF-8"?^> > .project
          echo ^<projectDescription^> >> .project
          echo ^<name^>%GITHUB_REPOSITORY_NAME%^</name^> >> .project
          echo ^<buildSpec^> >> .project
          echo ^<buildCommand^> >> .project
          echo ^<name^>org.eclipse.jdt.core.javabuilder^</name^> >> .project
          echo ^</buildCommand^> >> .project
          echo ^</buildSpec^> >> .project
          echo ^<natures^> >> .project
          echo ^<nature^>org.eclipse.jdt.core.javanature^</nature^> >> .project
          echo ^</natures^> >> .project
          echo ^</projectDescription^> >> .project
        )
        if not exist .classpath (
          echo ^<?xml version="1.0" encoding="UTF-8"?^> > .classpath
          echo ^<classpath^> >> .classpath
          echo ^<classpathentry kind="con" path="org.eclipse.jdt.launching.JRE_CONTAINER"/^> >> .classpath
          echo ^<classpathentry kind="src" path="src"/^> >> .classpath
          echo ^<classpathentry kind="output" path="bin"/^> >> .classpath
          echo ^</classpath^> >> .classpath
        )
        mkdir output

    - name: Compile with Eclipse
      run: |
        cd "%GITHUB_WORKSPACE%"
        echo Compiling project...
        "%ECLIPSE_HOME%\eclipsec.exe" ^
          -nosplash ^
          -application org.eclipse.jdt.core.JavaCompiler ^
          -data "%GITHUB_WORKSPACE%" ^
          -vm "%JAVA_HOME%\bin\javaw.exe" ^
          -project "%GITHUB_REPOSITORY_NAME%" ^
          -verbose
        echo Compilation successful!
        dir /s bin\*.class

    # ✅ 终极解决方案：手动下载并配置 Launch4j (100% 可靠)
    - name: Setup Launch4j manually
      run: |
        echo Downloading Launch4j 3.14 (official release)...
        curl -L -o launch4j.zip https://sourceforge.net/projects/launch4j/files/launch4j-3/3.14/launch4j-3.14-win32.zip/download
        
        echo Extracting Launch4j...
        mkdir "%RUNNER_TEMP%\launch4j"
        tar -xzf launch4j.zip -C "%RUNNER_TEMP%\launch4j" --strip-components=1
        
        echo Setting LAUNCH4J_HOME...
        echo "LAUNCH4J_HOME=%RUNNER_TEMP%\launch4j" >> %GITHUB_ENV%
        echo Launch4j installed at %RUNNER_TEMP%\launch4j
        dir "%RUNNER_TEMP%\launch4j"

    # ✅ 创建 JAR 文件 (必需步骤)
    - name: Create application JAR
      run: |
        cd "%GITHUB_WORKSPACE%"
        
        REM 确保输出目录存在
        mkdir bin 2>nul
        
        REM 创建包含所有类的 JAR (关键步骤)
        "%JAVA_HOME%\bin\jar" cvf bin\app.jar -C bin .
        echo Created app.jar (%ERRORLEVEL%)
        
        REM 复制依赖库 (根据实际项目调整)
        if exist lib (
          echo Copying dependencies...
          xcopy /E /I /Q lib output\lib >nul
        ) else (
          echo Creating empty lib folder
          mkdir output\lib
        )
        
        echo Final directory structure:
        dir /s bin output

    # ✅ 生成 Launch4j 配置 (动态替换主类)
    - name: Generate Launch4j config
      run: |
        cd "%GITHUB_WORKSPACE%"
        
        REM 设置您的主类 (关键! 必须修改)
        set MAIN_CLASS=com.hiveworkshop.wc3.gui.Program
        
        echo ^<?xml version="1.0" encoding="UTF-8"?^> > launch4j-config.xml
        echo ^<launch4jConfig^> >> launch4j-config.xml
        echo ^<headerType^>gui^</headerType^> >> launch4j-config.xml
        echo ^<outfile^>output/app.exe^</outfile^> >> launch4j-config.xml
        echo ^<jar^>bin/app.jar^</jar^> >> launch4j-config.xml
        echo ^<mainClass^>%MAIN_CLASS%^</mainClass^> >> launch4j-config.xml
        echo ^<errTitle^>Application Error^</errTitle^> >> launch4j-config.xml
        echo ^<chdir^>^</chdir^> >> launch4j-config.xml
        echo ^<jre^> >> launch4j-config.xml
        echo ^<minVersion^>1.8.0^</minVersion^> >> launch4j-config.xml
        echo ^<jdkPreference^>jdkOnly^</jdkPreference^> >> launch4j-config.xml
        echo ^</jre^> >> launch4j-config.xml
        echo ^<versionInfo^> >> launch4j-config.xml
        echo ^<fileVersion^>1.0.0.0^</fileVersion^> >> launch4j-config.xml
        echo ^<txtFileVersion^>1.0.0^</txtFileVersion^> >> launch4j-config.xml
        echo ^<productVersion^>1.0.0.0^</productVersion^> >> launch4j-config.xml
        echo ^<txtProductVersion^>1.0.0^</txtProductVersion^> >> launch4j-config.xml
        echo ^<fileDescription^>WC3 Map Editor^</fileDescription^> >> launch4j-config.xml
        echo ^<copyright^>© 2026 Hive Workshop^</copyright^> >> launch4j-config.xml
        echo ^<productName^>World Editor^</productName^> >> launch4j-config.xml
        echo ^<internalName^>worldeditor^</internalName^> >> launch4j-config.xml
        echo ^<originalFilename^>WorldEditor.exe^</originalFilename^> >> launch4j-config.xml
        echo ^</versionInfo^> >> launch4j-config.xml
        echo ^</launch4jConfig^> >> launch4j-config.xml
        
        echo Launch4j config generated:
        type launch4j-config.xml

    # ✅ 执行 Launch4j (100% 可靠)
    - name: Build EXE with Launch4j
      run: |
        cd "%GITHUB_WORKSPACE%"
        echo Running Launch4j from %LAUNCH4J_HOME%...
        
        REM 验证 Launch4j 是否可用
        "%LAUNCH4J_HOME%\launch4j.exe" --version
        
        REM 构建 EXE
        "%LAUNCH4J_HOME%\launch4j.exe" launch4j-config.xml
        
        REM 验证生成结果
        if not exist output\app.exe (
          echo ERROR: EXE file was not created!
          echo Checking output directory:
          dir output
          echo Launch4j logs:
          type launch4j.log 2>nul
          exit /b 1
        )
        
        echo EXE created successfully: output\app.exe
        echo Size: %~z1 bytes
        dir output\app.exe

    - name: Upload EXE artifact
      uses: actions/upload-artifact@v4
      with:
        name: WorldEditor-Windows
        path: output/app.exe
        retention-days: 30

    - name: Verify EXE
      run: |
        echo Testing EXE execution...
        output\app.exe --help || (
          echo WARNING: EXE verification failed but build succeeded
          echo This may be normal for GUI applications
          exit /b 0
        )
      continue-on-error: true
