name: Build Reteras Model Studio EXE

on:
  push:
    branches: [ CN ]  # 可以在这里指定触发工作流的分支

jobs:
  build:
    runs-on: windows-latest
    strategy:
      matrix:
        java: [ '17' ]  # 项目需要 JDK 17

    steps:
    - uses: actions/checkout@v4

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        java-version: ${{ matrix.java }}
        distribution: 'temurin'
        cache: 'gradle'

    - name: Gradle 编译生成 JAR
      run: |
        gradlew.bat assemble

    - name: 自动寻找JAR
      run: |
        $JAR = Get-ChildItem -Path target -Filter *.jar | Select-Object -First 1
        echo "JARFILE=$($JAR.Name)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

    - name: 自动创建精简JRE
      run: |
        jlink --add-modules ALL-MODULE-PATH --output jre

    - name: 打包EXE(无app无runtime 全部平铺根目录)
      run: |
        jpackage --type app-image `
          --input "D:\a\ReterasModelStudio\ReterasModelStudio\build\libs" `
          --main-jar "${{ env.JAR }}" `
          --dest "output" `
          --name "app" `
          --runtime-image "jre" `
          --app-image "output\final"

    - name: Upload EXE Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ReterasModelStudio-EXE
        path: D:/a/ReterasModelStudio/ReterasModelStudio

