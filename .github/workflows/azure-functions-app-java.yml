name: Build Official EXE (Native Launcher)

on:
  push:
    tags: ['CN']
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Maven 编译打包
        run: mvn package -DskipTests

      - name: 整理输出到根目录（无APP RUNTIME）
        run: |
          $jarFile = Get-ChildItem -Path "target" -Filter "*.jar" | Select-Object -First 1
          if ($jarFile) {
            Copy-Item -Path $jarFile.FullName -Destination "."
            Get-ChildItem -Path "target" -Exclude "*.jar" | Copy-Item -Destination "." -Recurse -Force
          }

      - name: Create final artifact
        uses: actions/upload-artifact@v4
        with:
          name: retera-jwc3-windows-official
          path: D:/a/ReterasModelStudio/ReterasModelStudio