name: Build Reteras Model Studio

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:  # 允许手动触发

jobs:
  build:
    runs-on: windows-latest
    strategy:
      matrix:
        java: [ '17' ]  # 项目需要 JDK 17 (根据 gradle.properties 推断)
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # 获取完整历史记录

    - name: Set up JDK ${{ matrix.java }}
      uses: actions/setup-java@v4
      with:
        java-version: ${{ matrix.java }}
        distribution: 'temurin'
        cache: 'gradle'

    # 安装必要工具
    - name: Setup tools
      run: |
        echo Installing required tools...
        choco install innosetup -y
        
        # 设置环境变量
        echo "ISCC_PATH=C:\Program Files (x86)\Inno Setup 6\ISCC.exe" >> $GITHUB_ENV
      shell: powershell

    - name: Grant execute permission for gradlew
      run: |
        chmod +x ./gradlew
      shell: bash

    # 构建项目
    - name: Build with Gradle
      run: |
        ./gradlew build --no-daemon --info
      shell: bash

    # 创建可执行 JAR
    - name: Create executable JAR
      run: |
        echo Creating executable JAR...
        mkdir -p build/libs
        ./gradlew jar --no-daemon
      shell: bash

    # 使用 jpackage 创建原生 Windows 应用 (JDK 14+)
    - name: Package Windows application
      run: |
        echo Creating Windows installer with jpackage...
        mkdir -p build/installer
        
        # 创建运行时映像
        jpackage create-installer ^
          --name "ReterasModelStudio" ^
          --input "build/libs" ^
          --main-jar "matrixeater.jar" ^
          --main-class "com.matrixeater.src.MainFrame" ^
          --type exe ^
          --app-version "1.0.0" ^
          --vendor "Retera" ^
          --description "Warcraft III Model Editor" ^
          --win-menu ^
          --win-shortcut ^
          --resource-dir "src/main/resources" ^
          --output "build/installer"
      shell: cmd

    # 创建 Inno Setup 安装程序
    - name: Create Inno Setup installer
      run: |
        echo Creating Inno Setup installer...
        mkdir -p build/innosetup
        
        # 生成 Inno Setup 脚本
        cat > build/innosetup/setup.iss << 'EOF'
        [Setup]
        AppName=Reteras Model Studio
        AppVersion=1.0.0
        DefaultDirName={autopf}\Reteras Model Studio
        DefaultGroupName=Reteras Model Studio
        OutputDir=build\installer
        OutputBaseFilename=ReterasModelStudio-Setup
        SetupIconFile=resources\icons\app.ico
        Compression=lzma2
        SolidCompression=yes
        PrivilegesRequired=lowest
        
        [Languages]
        Name: "english"; MessagesFile: "compiler:Default.isl"
        
        [Tasks]
        Name: "desktopicon"; Description: "Create a desktop icon"; GroupDescription: "Additional icons:"
        Name: "quicklaunchicon"; Description: "Create a Quick Launch icon"; GroupDescription: "Additional icons:"
        
        [Files]
        Source: "build\installer\ReterasModelStudio\runtime\*"; DestDir: "{app}\jre"; Flags: ignoreversion recursesubdirs createallsubdirs
        Source: "build\installer\ReterasModelStudio\ReterasModelStudio.exe"; DestDir: "{app}"; Flags: ignoreversion
        Source: "resources\*"; DestDir: "{app}\resources"; Flags: ignoreversion recursesubdirs createallsubdirs
        Source: "craft3data\*"; DestDir: "{app}\craft3data"; Flags: ignoreversion recursesubdirs createallsubdirs
        Source: "jars\*"; DestDir: "{app}\jars"; Flags: ignoreversion
        
        [Icons]
        Name: "{group}\Reteras Model Studio"; Filename: "{app}\ReterasModelStudio.exe"
        Name: "{group}\Uninstall Reteras Model Studio"; Filename: "{uninstallexe}"
        Name: "{commondesktop}\Reteras Model Studio"; Filename: "{app}\ReterasModelStudio.exe"; Tasks: desktopicon
        
        [Run]
        Filename: "{app}\ReterasModelStudio.exe"; Description: "Launch Reteras Model Studio"; Flags: nowait postinstall skipifsilent
        EOF
        
        # 运行 Inno Setup 编译器
        & "${env:ISCC_PATH}" "build\innosetup\setup.iss"
      shell: powershell

    # 上传构建产物
    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ReterasModelStudio-Windows
        path: |
          build/installer/ReterasModelStudio-Setup.exe
          build/libs/matrixeater.jar
        retention-days: 30

    # 验证安装程序
    - name: Verify installer
      run: |
        echo Verifying installer...
        if (-not (Test-Path "build/installer/ReterasModelStudio-Setup.exe")) {
          Write-Error "Installer was not created!"
          exit 1
        }
        $size = (Get-Item "build/installer/ReterasModelStudio-Setup.exe").Length
        Write-Host "Installer size: $size bytes"
        if ($size -lt 10000000) {  # 小于10MB可能是有问题的
          Write-Warning "Installer is unusually small ($size bytes)"
        }
      shell: powershell

  # 可选: 构建跨平台版本
  build-crossplatform:
    runs-on: ubuntu-latest
    needs: [build]
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'gradle'
    - name: Build cross-platform JAR
      run: |
        chmod +x ./gradlew
        ./gradlew jar --no-daemon
    - name: Upload cross-platform JAR
      uses: actions/upload-artifact@v4
      with:
        name: ReterasModelStudio-CrossPlatform
        path: build/libs/matrixeater.jar
        retention-days: 30
