name: Build Reteras Model Studio EXE

on:
  push:
    branches: [ master ]  # 可以在这里指定触发工作流的分支
  pull_request:
    branches: [ master ]  # 也可以为pull request设置触发

jobs:
  build:
    runs-on: windows-latest  # 使用Windows最新版本来编译EXE
    strategy:
      matrix:
        java: [ '17' ]  # 项目需要 JDK 17

    steps:
    - uses: actions/checkout@v4  # 检出仓库代码

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        java-version: ${{ matrix.java }}
        distribution: 'temurin'
        cache: 'gradle'

    - name: Grant execute permission for gradlew
      run: chmod +x ./gradlew  # 在Windows上这一步可能不是必需的，取决于你的脚本权限
      working-directory: ./  # 根据实际情况调整工作目录

    - name: Build with Gradle
      run: ./gradlew gradlew.bat  # 替换为实际的打包命令或脚本
      working-directory: ./  # 根据实际情况调整工作目录

    - name: Upload EXE Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ReterasModelStudio-EXE
        path: build/libs/*.exe  # 假设EXE文件生成在build/libs目录下，根据实际情况调整
