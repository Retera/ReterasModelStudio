name: Build Reteras Model Studio EXE

on:
  push:
    branches: [ CN ]  # 可以在这里指定触发工作流的分支

jobs:
  build:
    runs-on: windows-latest
    strategy:
      matrix:
        java: [ '17' ]  # 项目需要 JDK 17

    steps:
    - uses: actions/checkout@v4

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        java-version: ${{ matrix.java }}
        distribution: 'temurin'
        cache: 'gradle'

    - name: Gradle 编译生成可执行JAR
      run: |
        ./gradlew.bat :matrixeater:dist

    - name: 查找可执行JAR
      run: |
        $jar = Get-ChildItem -Path "matrixeater\build\libs" -Filter "*.jar" | Where-Object { $_.Name -notmatch "plain|javadoc|sources" } | Select-Object -First 1
        if ($null -eq $jar) {
          Write-Error "未找到可执行JAR文件"
          exit 1
        }
        echo "JARFILE=$($jar.Name)" | Out-File -FilePath $env:GITHUB_ENV -Append
        echo "JARPATH=$($jar.DirectoryName)" | Out-File -FilePath $env:GITHUB_ENV -Append
        Write-Host "找到JAR: $($jar.FullName)"

    - name: 生成精简JRE
      run: |
        jlink --add-modules ALL-MODULE-PATH --output jre

    - name: 打包EXE到根目录
      run: |
        jpackage --type app-image `
          --input "${{ env.JARPATH }}" `
          --main-jar "${{ env.JARFILE }}" `
          --main-class "com.matrixeater.src.MainFrame" `
          --dest "." `
          --name "ReterasModelStudio" `
          --runtime-image "jre" `

    - name: 重命名并整理输出
      run: |
        # 将生成的应用目录移动到根目录并重命名
        if (Test-Path "ReterasModelStudio") {
          Move-Item -Path "ReterasModelStudio" -Destination "ReterasModelStudio-App" -Force
        }
        
        # 列出最终输出内容
        Get-ChildItem -Recurse | Select-Object FullName, Length | Format-Table -AutoSize

    - name: Upload EXE Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ReterasModelStudio-EXE
        path: .
