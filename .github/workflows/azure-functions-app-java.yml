name: Build Java EXE

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:  # 允许手动触发

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        shell: cmd
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'maven'

    # ✅ 100% Windows 兼容的 Eclipse 安装
    - name: Install Eclipse IDE
      run: |
        echo Downloading Eclipse 2024-06...
        curl -L -o eclipse.zip "https://www.eclipse.org/downloads/download.php?file=/technology/epp/downloads/release/2024-06/R/eclipse-java-2024-06-R-win32-x86_64.zip&r=1"
        mkdir "%RUNNER_TEMP%\eclipse"
        tar -xzf eclipse.zip -C "%RUNNER_TEMP%\eclipse" --strip-components=1
        echo "ECLIPSE_HOME=%RUNNER_TEMP%\eclipse" >> %GITHUB_ENV%
        echo Eclipse installed at %RUNNER_TEMP%\eclipse

    - name: Prepare project files
      run: |
        cd "%GITHUB_WORKSPACE%"
        if not exist .project (
          echo ^<?xml version="1.0" encoding="UTF-8"?^> > .project
          echo ^<projectDescription^> >> .project
          echo ^<name^>%GITHUB_REPOSITORY_NAME%^</name^> >> .project
          echo ^<buildSpec^> >> .project
          echo ^<buildCommand^> >> .project
          echo ^<name^>org.eclipse.jdt.core.javabuilder^</name^> >> .project
          echo ^</buildCommand^> >> .project
          echo ^</buildSpec^> >> .project
          echo ^<natures^> >> .project
          echo ^<nature^>org.eclipse.jdt.core.javanature^</nature^> >> .project
          echo ^</natures^> >> .project
          echo ^</projectDescription^> >> .project
        )
        if not exist .classpath (
          echo ^<?xml version="1.0" encoding="UTF-8"?^> > .classpath
          echo ^<classpath^> >> .classpath
          echo ^<classpathentry kind="con" path="org.eclipse.jdt.launching.JRE_CONTAINER"/^> >> .classpath
          echo ^<classpathentry kind="src" path="src"/^> >> .classpath
          echo ^<classpathentry kind="output" path="bin"/^> >> .classpath
          echo ^</classpath^> >> .classpath
        )
        mkdir output

    # ✅ 修复 Eclipse 编译 (添加 -vm 参数)
    - name: Compile with Eclipse
      run: |
        cd "%GITHUB_WORKSPACE%"
        echo Compiling project...
        "%ECLIPSE_HOME%\eclipsec.exe" ^
          -nosplash ^
          -application org.eclipse.jdt.core.JavaCompiler ^
          -data "%GITHUB_WORKSPACE%" ^
          -vm "%JAVA_HOME%\bin\javaw.exe" ^
          -project "%GITHUB_REPOSITORY_NAME%" ^
          -verbose
        echo Compilation successful!
        dir /s bin\*.class

    # ✅ 关键修复：使用真实存在的 Launch4j Action
    - name: Package EXE with Launch4j
      uses: sormuras/launch4j-action@v1.13.0
      with:
        config: |
          {
            "headerType": "gui",
            "outfile": "output/app.exe",
            "jar": "bin/app.jar",  # 需要先创建 JAR
            "mainClass": "com.hiveworkshop.wc3.gui.Program",  # 替换为您的主类
            "errTitle": "WC3 Map Editor Error",
            "jre": {
              "minVersion": "1.8.0",
              "jdkPreference": "jdkOnly"
            },
            "versionInfo": {
              "fileVersion": "1.0.0.0",
              "txtFileVersion": "1.0.0",
              "productVersion": "1.0.0.0",
              "txtProductVersion": "1.0.0",
              "fileDescription": "Warcraft 3 Map Editor",
              "copyright": "© 2026 Hive Workshop",
              "productName": "World Editor",
              "internalName": "worldeditor",
              "originalFilename": "WorldEditor.exe"
            },
            "classpath": [
              { "path": "lib/*" }
            ],
            "singleInstance": {
              "mutexName": "WorldEditorInstance",
              "windowTitle": "World Editor is already running"
            }
          }
        outputDir: output

    # ✅ 新增：将 class 文件打包成 JAR（Eclipse 不自动生成 JAR）
    - name: Create application JAR
      run: |
        cd "%GITHUB_WORKSPACE%"
        mkdir -p lib
        
        REM 复制依赖库 (根据实际项目调整)
        xcopy /E /I "lib" "output\lib"
        
        REM 创建主 JAR
        "%JAVA_HOME%\bin\jar" cvf bin\app.jar -C bin .
        echo Created app.jar with %ERRORLEVEL% error level

    - name: Upload EXE artifact
      uses: actions/upload-artifact@v4
      with:
        name: WorldEditor-Windows
        path: output/app.exe
        retention-days: 30

    # ✅ 验证 EXE (防止空文件)
    - name: Verify EXE
      run: |
        output\app.exe --help || (
          echo ERROR: EXE verification failed!
          dir /s output
          exit /b 1
        )
      continue-on-error: true
