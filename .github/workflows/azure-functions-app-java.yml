name: Build Reteras Model Studio EXE

on:
  push:
    branches: [ CN ]  # 可以在这里指定触发工作流的分支
  pull_request:
    branches: [ CN ]  # 也可以为pull request设置触发

jobs:
  build:
    runs-on: windows-latest  # 使用Windows最新版本来编译EXE
    strategy:
      matrix:
        java: [ '17' ]  # 项目需要 JDK 17

    steps:
    - uses: actions/checkout@v4

    - name: 安装 Java
      uses: actions/setup-java@v4
      with:
        java-version: ${{ matrix.java }}
        distribution: 'temurin'
        cache: 'gradle'

    - name: 授权 gradlew 执行
      run: chmod +x ./gradlew  # 在Windows上这一步可能不是必需的，取决于你的脚本权限
      working-directory: ./  # 根据实际情况调整工作目录

    - name: 查找Gradle可用任务
      run: ./gradlew.bat tasks --all
      working-directory: ./

    - name: 构建 Gradle
      run: ./gradlew.bat
      working-directory: ./

    - name: jpackageImage打包生成EXE运行文件
      run: ./gradlew.bat :matrixeater:jpackageImage
      working-directory: ./

    # - name: jpackage打包生成EXE安装程序
    #   run: ./gradlew.bat :matrixeater:jpackage
    #   working-directory: ./

    # - name: runtime打包生成扁平化目录
    #   run: ./gradlew.bat :matrixeater:runtime
    #   working-directory: ./

    - name: 检查公共位置
      id: check_exe
      run: |
        echo "Checking ./ for EXE files..."
        if (Test-Path "./*.*") {
          echo "Found EXE in ./"
        } else {
          echo "No EXE found in ./"
        }
      shell: pwsh

    - name: 列出构建目录文件
      run: |
        echo "Listing all files in build directory:"
        Get-ChildItem -Recurse ./ | Where-Object { $_.Extension -eq ".*" } | ForEach-Object {
          echo "Found EXE: $_"
        }

        echo "Listing all files in ./:"
        Get-ChildItem ./ | ForEach-Object {
          echo "File: $_"
        }

        echo "Listing all files in ./:"
        Get-ChildItem ./ | ForEach-Object {
          echo "File: $_"
        }
      shell: pwsh

    - name: 上传EXE运行文件
      uses: actions/upload-artifact@v4
      with:
        name: ReterasModelStudio
        path: D:\a\ReterasModelStudio\ReterasModelStudio

