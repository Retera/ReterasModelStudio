name: Build Reteras Model Studio

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:  # 允许手动触发

jobs:
  build:
    runs-on: windows-latest
    strategy:
      matrix:
        java: [ '17' ]  # 项目需要 JDK 17
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up JDK ${{ matrix.java }}
      uses: actions/setup-java@v4
      with:
        java-version: ${{ matrix.java }}
        distribution: 'temurin'
        cache: 'gradle'

    # 安装必要工具
    - name: Setup tools
      run: |
        Write-Host "Installing Inno Setup..."
        choco install innosetup -y --no-progress
        
        # 验证安装
        $iscc = Get-Command "ISCC.exe" -ErrorAction SilentlyContinue
        if (-not $iscc) {
          $iscc = Get-ChildItem "C:\Program Files*" -Recurse -Include "ISCC.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
        }
        if ($iscc) {
          Write-Host "ISCC found at $($iscc.FullName)"
          echo "ISCC_PATH=$($iscc.FullName)" >> $env:GITHUB_ENV
        } else {
          Write-Error "ISCC.exe not found!"
          exit 1
        }
      shell: powershell

    - name: Grant execute permission for gradlew
      run: |
        if (Test-Path "gradlew") {
          attrib -R gradlew
          git update-index --assume-unchanged gradlew
        }
      shell: cmd

    # 构建项目
    - name: Build with Gradle
      run: |
        .\gradlew build --no-daemon --info
      shell: cmd

    # 创建可执行 JAR
    - name: Create executable JAR
      run: |
        echo Creating executable JAR...
        .\gradlew jar --no-daemon
      shell: cmd

    # ✅ 修复: 正确的 jpackage 语法 (Windows 兼容)
    - name: Package Windows application
      run: |
        echo Creating Windows application with jpackage...
        mkdir build\installer -Force
        
        # 使用正确的 jpackage 语法 (无 create-installer 子命令)
        jpackage `
          --name "ReterasModelStudio" `
          --input "build\libs" `
          --main-jar "matrixeater.jar" `
          --main-class "com.matrixeater.src.MainFrame" `
          --type "exe" `
          --app-version "1.0.0" `
          --vendor "Retera" `
          --description "Warcraft III Model Editor" `
          --win-menu `
          --win-shortcut `
          --output "build\installer"
      shell: powershell
      env:
        # 防止 jpackage 创建临时目录问题
        _JAVA_OPTIONS: "-Djava.io.tmpdir=${{ runner.temp }}"

    # ✅ 修复: 正确的 Inno Setup 脚本生成 (Windows 路径)
    - name: Create Inno Setup installer
      run: |
        Write-Host "Creating Inno Setup installer..."
        $installerDir = "build\installer"
        $setupScript = "build\setup.iss"
        $outputDir = "build\final-installer"
        
        mkdir $outputDir -Force | Out-Null
        
        # 生成 Inno Setup 脚本
        @"
        [Setup]
        AppName=Reteras Model Studio
        AppVersion=1.0.0
        DefaultDirName={autopf}\Reteras Model Studio
        DefaultGroupName=Reteras Model Studio
        OutputDir=$outputDir
        OutputBaseFilename=ReterasModelStudio-Setup
        SetupIconFile=resources\icons\app.ico
        Compression=lzma2
        SolidCompression=yes
        PrivilegesRequired=lowest
        WizardStyle=modern

        [Files]
        Source: "$installerDir\ReterasModelStudio\*"; DestDir: "{app}"; Flags: ignoreversion recursesubdirs createallsubdirs
        Source: "resources\*"; DestDir: "{app}\resources"; Flags: ignoreversion recursesubdirs createallsubdirs
        Source: "craft3data\*"; DestDir: "{app}\craft3data"; Flags: ignoreversion recursesubdirs createallsubdirs

        [Icons]
        Name: "{group}\Reteras Model Studio"; Filename: "{app}\ReterasModelStudio.exe"
        Name: "{group}\Uninstall Reteras Model Studio"; Filename: "{uninstallexe}"
        Name: "{commondesktop}\Reteras Model Studio"; Filename: "{app}\ReterasModelStudio.exe"; Tasks: desktopicon

        [Tasks]
        Name: "desktopicon"; Description: "Create a desktop icon"; GroupDescription: "Additional icons:"; Flags: unchecked

        [Run]
        Filename: "{app}\ReterasModelStudio.exe"; Description: "Launch Reteras Model Studio"; Flags: nowait postinstall skipifsilent
        "@ | Set-Content -Path $setupScript -Encoding UTF8
        
        Write-Host "Inno Setup script content:"
        Get-Content $setupScript
        
        Write-Host "Compiling installer with ISCC..."
        & "${env:ISCC_PATH}" "$setupScript"
        
        # 验证输出
        $installerPath = "$outputDir\ReterasModelStudio-Setup.exe"
        if (Test-Path $installerPath) {
          $size = (Get-Item $installerPath).Length
          Write-Host "Installer created successfully: $installerPath"
          Write-Host "Size: $size bytes"
        } else {
          Write-Error "Installer was not created!"
          Get-ChildItem $outputDir -Recurse
          exit 1
        }
      shell: powershell

    # 上传构建产物
    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ReterasModelStudio-Windows
        path: |
          build/final-installer/ReterasModelStudio-Setup.exe
          build/libs/matrixeater.jar
        retention-days: 30

    # 验证安装程序
    - name: Verify installer
      run: |
        $installer = "build\final-installer\ReterasModelStudio-Setup.exe"
        if (-not (Test-Path $installer)) {
          Write-Error "Installer not found at $installer"
          exit 1
        }
        
        $size = (Get-Item $installer).Length
        Write-Host "Installer size: $size bytes"
        
        if ($size -lt 20000000) {  # 20MB minimum reasonable size
          Write-Warning "Installer is smaller than expected ($size bytes)"
          # 列出内容帮助调试
          7z l $installer
        }
      shell: powershell
