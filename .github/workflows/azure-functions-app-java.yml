name: Build Reteras Model Studio EXE

on:
  push:
    branches: [ CN ]

jobs:
  build:
    runs-on: windows-latest
    strategy:
      matrix:
        java: [ '17' ]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        java-version: ${{ matrix.java }}
        distribution: 'temurin'
        cache: 'gradle'

    - name: Gradle 编译生成可执行JAR
      run: |
        ./gradlew.bat :matrixeater:dist

    - name: 查找可执行JAR
      run: |
        $jar = Get-ChildItem -Path "matrixeater\build\libs" -Filter "*.jar" | Where-Object { $_.Name -notmatch "plain|javadoc|sources" } | Select-Object -First 1
        echo "JARFILE=$($jar.Name)" | Out-File -FilePath $env:GITHUB_ENV -Append
        echo "JARPATH=$($jar.DirectoryName)" | Out-File -FilePath $env:GITHUB_ENV -Append

    - name: 生成 JRE 到打包目录（根目录结构）
      run: |
        jlink --add-modules ALL-MODULE-PATH --output ./ReterasModelStudio

    - name: 打包EXE（自动生成到 app 目录）
      run: |
        jpackage `
          --type app-image `
          --input "${{ env.JARPATH }}" `
          --main-jar "${{ env.JARFILE }}" `
          --main-class "com.matrixeater.src.MainFrame" `
          --dest "." `
          --name "ac" `
          --runtime-image "./ReterasModelStudio"

    - name: 合并成纯净根目录（只移动，不破坏程序）
      run: |
        Move-Item app/* ./ReterasModelStudio
        Remove-Item app -Recurse -Force
        Remove-Item runtime -Recurse -Force

    - name: 上传最终程序
      uses: actions/upload-artifact@v4
      with:
        name: ReterasModelStudio-Portable
        path: ./ReterasModelStudio