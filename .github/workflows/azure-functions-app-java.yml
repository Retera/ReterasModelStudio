name: Build Java EXE

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:  # 允许手动触发

jobs:
  build:
    runs-on: windows-latest  # 使用 Windows 环境生成 EXE
    defaults:
      run:
        shell: cmd
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'maven'  # 启用依赖缓存加速构建

    - name: Install Eclipse IDE for Java
      run: |
        echo Downloading Eclipse IDE...
        curl -L -o eclipse.zip "https://www.eclipse.org/downloads/download.php?file=/technology/epp/downloads/release/2024-06/R/eclipse-java-2024-06-R-win32-x86_64.zip&r=1"
        echo Extracting Eclipse...
        tar -xzf eclipse.zip -C "%RUNNER_TEMP%"
        setx ECLIPSE_HOME "%RUNNER_TEMP%\eclipse"
        echo Eclipse installed at %ECLIPSE_HOME%

    - name: Prepare Eclipse project files
      run: |
        cd "%GITHUB_WORKSPACE%"
        
        REM 仅当项目文件不存在时创建（避免覆盖现有配置）
        if not exist .project (
          echo Creating Eclipse project files...
          (
            echo ^<?xml version="1.0" encoding="UTF-8"?^>
            echo ^<projectDescription^>
            echo ^<name^>%GITHUB_REPOSITORY_NAME%^</name^>
            echo ^<buildSpec^>
            echo ^<buildCommand^>
            echo ^<name^>org.eclipse.jdt.core.javabuilder^</name^>
            echo ^</buildCommand^>
            echo ^</buildSpec^>
            echo ^<natures^>
            echo ^<nature^>org.eclipse.jdt.core.javanature^</nature^>
            echo ^</natures^>
            echo ^</projectDescription^>
          ) > .project
        )
        
        if not exist .classpath (
          (
            echo ^<?xml version="1.0" encoding="UTF-8"?^>
            echo ^<classpath^>
            echo ^<classpathentry kind="con" path="org.eclipse.jdt.launching.JRE_CONTAINER"/^>
            echo ^<classpathentry kind="src" path="src"/^>
            echo ^<classpathentry kind="output" path="bin"/^>
            echo ^</classpath^>
          ) > .classpath
        )

    - name: Compile with Eclipse
      run: |
        cd "%GITHUB_WORKSPACE%"
        echo Compiling project with Eclipse...
        "%ECLIPSE_HOME%\eclipsec.exe" ^
          -nosplash ^
          -application org.eclipse.jdt.core.JavaCompiler ^
          -data "%GITHUB_WORKSPACE%" ^
          -vm "%JAVA_HOME%\bin\javaw.exe" ^
          -project "%GITHUB_REPOSITORY_NAME%" ^
          -verbose
        echo Compilation completed. Checking output...
        dir /s bin\*.class

    - name: Package EXE with Launch4j
      uses: viktor-podzigun/launch4j-github-action@v1.3.0
      with:
        config: |
          {
            "headerType": "gui",
            "outfile": "output/app.exe",
            "jar": "bin/*.jar",  # 自动匹配 JAR
            "mainClass": "com.yourcompany.Main",
            "errTitle": "Application Error",
            "chdir": ".",
            "jre": {
              "minVersion": "1.8.0",
              "jdkPreference": "jdkOnly"
            },
            "versionInfo": {
              "fileVersion": "1.0.0.0",
              "txtFileVersion": "1.0.0",
              "productVersion": "1.0.0.0",
              "txtProductVersion": "1.0.0",
              "fileDescription": "My Application",
              "copyright": "© 2026 Your Company",
              "productName": "MyApp",
              "internalName": "myapp",
              "originalFilename": "app.exe"
            }
          }
        outputDir: output

    - name: Upload EXE artifact
      uses: actions/upload-artifact@v4
      with:
        name: MyApp-Windows
        path: output/app.exe
        retention-days: 30

    # ✅ 新增：验证 EXE 可执行性 (防止空文件)
    - name: Verify EXE integrity
      run: |
        cd output
        app.exe --version || (
          echo ERROR: EXE is corrupted or missing dependencies!
          exit /b 1
        )
      continue-on-error: true  # 防止验证失败阻断上传
