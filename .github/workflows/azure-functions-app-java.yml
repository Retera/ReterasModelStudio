name: Build Official EXE (Native Launcher)

on:
  push:
    tags: ['CN']
  workflow_dispatch:


jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          architecture: 'x64'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: 执行打包（零修改源码·无APP RUNTIME·根目录输出）
        run: |
          python package.py

      - name: Create final artifact
        uses: actions/upload-artifact@v4
        with:
          name: retera-jwc3-windows-official
          path: D:/a/ReterasModelStudio/ReterasModelStudio